<style id="tokens">
/* ==========================================================================
   VP Equities / VP Buys Homes — Core Foundations
   Colors, typography, spacing, radii, shadows, motion
   Source of truth: vp-equities-brand-guidelines.html (2025)
   ========================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700&display=swap');

:root {
  /* --------------------------------------------------------------------
     COLOR — canonical brand palette (from brand guidelines, section 02)
     80% navy · 20% amber · white/tint for breathing room
     -------------------------------------------------------------------- */

  /* Primary */
  --navy:       #1B365D;   /* True Navy — primary brand */
  --navy-deep:  #0F2040;   /* deeper navy (for gradients, over-navy cards) */
  --navy-mid:   #264D80;   /* mid tone for eyebrows on light */
  --navy-900:   #0D1B2A;   /* Near Black — body text */

  /* Accent */
  --amber:      #F2A65A;   /* Warm Amber — CTA / accent ONLY */
  --amber-dark: #D4862E;   /* hover / pressed amber */

  /* Surfaces */
  --white:      #FFFFFF;
  --light:      #EEF2F7;   /* page tint — digital backgrounds */
  --border:     #D1DCE8;   /* hairline on light */

  /* Neutrals */
  --dark:       #0D1B2A;   /* body text */
  --gray-900:   #111827;
  --gray-700:   #374151;
  --gray-500:   #6B7280;   /* caption / meta */
  --gray-400:   #9CA3AF;
  --gray-300:   #CBD5E1;
  --gray-100:   #F3F4F6;

  /* Semantic */
  --success:    #15803D;
  --success-bg: #DCFCE7;
  --warning:    #B45309;
  --warning-bg: #FEF3E2;
  --danger:     #B42318;
  --danger-bg:  #FEE4E2;

  /* Semantic aliases */
  --bg:        var(--white);
  --bg-tint:   var(--light);
  --bg-navy:   var(--navy);
  --bg-deep:   var(--navy-deep);

  --fg:        var(--dark);
  --fg-muted:  var(--gray-500);
  --fg-subtle: var(--gray-400);
  --fg-invert: var(--white);
  --fg-brand:  var(--navy);
  --fg-accent: var(--amber);

  --border-ink:   var(--navy);
  --border-hair:  var(--border);

  /* --------------------------------------------------------------------
     TYPE — Two families only (section 03)
     Barlow Semi Condensed = all headlines / display
     Nunito Sans           = all body / UI
     -------------------------------------------------------------------- */

  --fh: 'Barlow Semi Condensed', 'Arial Narrow', 'Helvetica Neue', sans-serif;
  --fb: 'Nunito Sans', 'Helvetica Neue', system-ui, sans-serif;
  --fm: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* Legacy aliases for convenience */
  --font-head: var(--fh);
  --font-body: var(--fb);

  /* Type scale — tuned to brand specimen */
  --fs-mega:    72px;   /* hero display */
  --fs-h1:      56px;
  --fs-h2:      38px;   /* section title from spec */
  --fs-h3:      28px;
  --fs-h4:      22px;
  --fs-h5:      18px;
  --fs-lead:    18px;
  --fs-body:    15px;
  --fs-body-sm: 13px;
  --fs-cap:     11px;   /* eyebrow / meta — UPPERCASE tracked */
  --fs-micro:   10px;

  --lh-tight: 1.0;
  --lh-snug:  1.15;
  --lh-base:  1.7;      /* body is noticeably open (spec: 1.7) */
  --lh-ui:    1.5;

  --tr-display: 0.02em; /* Barlow display tracking */
  --tr-cap:     0.14em; /* small label */
  --tr-eyebrow: 0.18em; /* tiny eyebrow */
  --tr-upper:   0.06em; /* button uppercase */

  /* --------------------------------------------------------------------
     SPACING — 4px base
     -------------------------------------------------------------------- */
  --s-0:  0;
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  20px;
  --s-6:  24px;
  --s-8:  32px;
  --s-10: 40px;
  --s-12: 48px;
  --s-14: 56px;
  --s-16: 64px;
  --s-18: 72px;   /* section vertical padding from spec */
  --s-20: 80px;
  --s-24: 96px;
  --s-32: 128px;

  /* --------------------------------------------------------------------
     RADII — modest, professional (matches brand docs: 4–10px)
     -------------------------------------------------------------------- */
  --r-xs:  3px;
  --r-sm:  4px;
  --r-md:  6px;
  --r-lg:  8px;    /* canonical card radius */
  --r-xl:  10px;
  --r-2xl: 14px;
  --r-pill: 999px;

  /* --------------------------------------------------------------------
     SHADOWS — cool/neutral, subtle. Cards are quiet, CTAs are confident.
     -------------------------------------------------------------------- */
  --shadow-xs: 0 1px 2px rgba(13, 27, 42, 0.06);
  --shadow-sm: 0 2px 6px rgba(13, 27, 42, 0.06), 0 1px 2px rgba(13, 27, 42, 0.04);
  --shadow-md: 0 4px 14px rgba(13, 27, 42, 0.10), 0 2px 4px rgba(13, 27, 42, 0.04);
  --shadow-lg: 0 10px 30px rgba(13, 27, 42, 0.12), 0 4px 10px rgba(13, 27, 42, 0.06);
  --shadow-xl: 0 24px 48px rgba(13, 27, 42, 0.18), 0 10px 20px rgba(13, 27, 42, 0.08);
  --shadow-amber: 0 6px 20px rgba(242, 166, 90, 0.35);

  /* Rings */
  --ring-amber: 0 0 0 3px rgba(242, 166, 90, 0.45);
  --ring-navy:  0 0 0 3px rgba(27, 54, 93, 0.25);

  /* --------------------------------------------------------------------
     MOTION — fast, direct (no bounce, no dawdling)
     -------------------------------------------------------------------- */
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);
  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out:   cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast:  120ms;
  --dur-med:   200ms;
  --dur-slow:  360ms;

  /* Layout */
  --container-max:   1200px;
  --container-tight: 960px;
}

/* ==========================================================================
   SEMANTIC DEFAULTS
   ========================================================================== */

html, body {
  font-family: var(--fb);
  font-size: var(--fs-body);
  line-height: var(--lh-base);
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Barlow display — ALL CAPS permitted for hero/H1 (brand voice); tracking 0.02em */
.display, h1, .h1 {
  font-family: var(--fh);
  font-size: var(--fs-h1);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-display);
  font-weight: 700;
  color: var(--navy);
  text-transform: uppercase;
  text-wrap: balance;
}

.hero-display {
  font-family: var(--fh);
  font-size: var(--fs-mega);
  font-weight: 700;
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-display);
  color: var(--navy);
  text-transform: uppercase;
  text-wrap: balance;
}

h2, .h2 {
  font-family: var(--fh);
  font-size: var(--fs-h2);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-display);
  font-weight: 700;
  color: var(--navy);
  text-transform: uppercase;
  text-wrap: balance;
}

h3, .h3 {
  font-family: var(--fh);
  font-size: var(--fs-h3);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-display);
  font-weight: 700;
  color: var(--navy);
  text-transform: uppercase;
}

h4, .h4 {
  font-family: var(--fh);
  font-size: var(--fs-h4);
  line-height: var(--lh-snug);
  letter-spacing: 0.04em;
  font-weight: 600;
  color: var(--navy);
  text-transform: uppercase;
}

h5, .h5 {
  font-family: var(--fh);
  font-size: var(--fs-h5);
  line-height: var(--lh-snug);
  font-weight: 600;
  color: var(--navy);
}

p, .body {
  font-size: var(--fs-body);
  line-height: var(--lh-base);
  color: var(--gray-700);
  text-wrap: pretty;
}

.lead {
  font-size: var(--fs-lead);
  line-height: 1.6;
  color: var(--gray-700);
  text-wrap: pretty;
}

.caption {
  font-size: var(--fs-body-sm);
  color: var(--gray-500);
  line-height: var(--lh-base);
}

.eyebrow {
  font-family: var(--fb);
  font-size: var(--fs-cap);
  font-weight: 700;
  letter-spacing: var(--tr-cap);
  text-transform: uppercase;
  color: var(--amber);
  line-height: 1;
}

.eyebrow--navy { color: var(--navy-mid); }
.eyebrow--white { color: rgba(255, 255, 255, 0.4); }

.micro-label {
  font-family: var(--fb);
  font-size: var(--fs-micro);
  font-weight: 600;
  letter-spacing: var(--tr-eyebrow);
  text-transform: uppercase;
  color: var(--gray-500);
}

a {
  color: var(--navy);
  text-decoration-thickness: 1px;
  text-underline-offset: 3px;
  transition: color var(--dur-fast) var(--ease-standard);
}
a:hover { color: var(--amber-dark); }

/* Selection */
::selection {
  background: var(--amber);
  color: var(--white);
}

:focus-visible {
  outline: none;
  box-shadow: var(--ring-amber);
  border-radius: var(--r-sm);
}

</style>
<style>
  html,body{margin:0;padding:0;background:#fff;color:var(--dark);scroll-behavior:smooth}
  *{box-sizing:border-box}
  .container{max-width:1200px;margin:0 auto;padding:0 28px}
  /* Header */
  .site-hdr{position:sticky;top:0;background:rgba(255,255,255,.88);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);border-bottom:1px solid transparent;z-index:50;transition:border-color 200ms}
  .site-hdr.scr{border-bottom-color:var(--border)}
  .hdr-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
  .logo{display:flex;align-items:center;gap:6px;text-decoration:none}
  .logo .vp{font-family:var(--fh);font-size:24px;font-weight:700;color:var(--navy);letter-spacing:.02em;line-height:1}
  .logo .div{width:1px;height:22px;background:rgba(27,54,93,.2);margin:0 3px}
  .logo .eq{font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--navy);text-transform:uppercase;line-height:1}
  .nav{display:flex;gap:32px;align-items:center}
  .nav a{font-family:var(--fb);font-size:13px;font-weight:600;color:var(--dark);text-decoration:none;letter-spacing:.02em;white-space:nowrap;transition:color 120ms}
  .nav a:hover{color:var(--amber-dark)}
  .nav-cta{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:var(--amber);color:#fff;font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:4px;text-decoration:none;white-space:nowrap;transition:background 120ms}
  .nav-cta:hover{background:var(--amber-dark);color:#fff}
  .phn{font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--navy);text-transform:uppercase}
  .phn .p{color:var(--amber);margin-right:4px}

  /* Hero */
  .hero{background:var(--navy);color:#fff;padding:84px 0 120px;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;right:-80px;top:-100px;width:420px;height:420px;border-radius:50%;border:72px solid rgba(255,255,255,.04)}
  .hero::after{content:'';position:absolute;right:60px;bottom:-120px;width:240px;height:240px;border-radius:50%;border:40px solid rgba(255,255,255,.03)}
  .hero-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:56px;align-items:center;position:relative;z-index:1}
  .hero-eb{display:inline-flex;align-items:center;gap:8px;font-family:var(--fb);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:18px}
  .hero-eb::before{content:'';width:24px;height:2px;background:var(--amber)}
  .hero h1{font-family:var(--fh);font-size:58px;font-weight:700;letter-spacing:.02em;color:#fff;text-transform:uppercase;line-height:1.02;margin:0 0 24px;text-wrap:balance}
  .hero h1 em{font-style:normal;color:var(--amber);position:relative;display:inline-block}
  .hero-sub{font-family:var(--fb);font-size:17px;line-height:1.65;color:rgba(255,255,255,.72);max-width:520px;margin:0 0 28px}
  .hero-bullets{list-style:none;padding:0;margin:0 0 32px;display:flex;flex-direction:column;gap:10px}
  .hero-bullets li{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.85);font-size:14px}
  .hero-bullets li::before{content:'';width:16px;height:16px;border-radius:50%;background:var(--amber);flex-shrink:0;position:relative}
  .hero-bullets li{position:relative}
  .hero-bullets li .chk{position:absolute;left:3px;color:#fff;font-size:11px;font-weight:900;line-height:16px}
  .hero-ctas{display:flex;gap:12px;align-items:center}
  .btn-amber{display:inline-flex;align-items:center;gap:8px;padding:14px 26px;background:var(--amber);color:#fff;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:4px;text-decoration:none;box-shadow:var(--shadow-amber);cursor:pointer;transition:all 120ms var(--ease-standard)}
  .btn-amber:hover{background:var(--amber-dark);transform:translateY(-1px);color:#fff}
  .btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:14px 22px;background:transparent;color:#fff;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid rgba(255,255,255,.3);border-radius:4px;text-decoration:none;cursor:pointer;transition:all 120ms}
  .btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.06);color:#fff}

  /* Offer form card in hero */
  .offer-card{background:#fff;color:var(--dark);border-radius:10px;padding:26px;box-shadow:var(--shadow-xl);position:relative}
  .offer-card::before{content:'';position:absolute;top:-1px;left:24px;right:24px;height:3px;background:var(--amber);border-radius:0 0 3px 3px}
  .offer-eb{font-family:var(--fb);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-dark);margin-bottom:6px}
  .offer-h{font-family:var(--fh);font-size:24px;font-weight:700;letter-spacing:.02em;color:var(--navy);text-transform:uppercase;line-height:1.1;margin:0 0 6px}
  .offer-sub{font-size:13px;color:var(--gray-500);margin:0 0 18px;line-height:1.55}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .in{width:100%;padding:12px 14px;font-family:var(--fb);font-size:14px;color:var(--dark);background:#fff;border:1px solid var(--border);border-radius:6px;outline:none;transition:all 120ms}
  .in:focus{border-color:var(--navy);box-shadow:var(--ring-navy)}
  .in.full{grid-column:1/-1}
  .offer-btn{width:100%;margin-top:4px;padding:15px;background:var(--amber);color:#fff;font-family:var(--fh);font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;box-shadow:var(--shadow-amber);transition:all 120ms}
  .offer-btn:hover{background:var(--amber-dark)}
  .offer-foot{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--gray-500);margin-top:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .offer-foot .dot{width:5px;height:5px;border-radius:50%;background:#15803D}

  /* ============ KINETIC HERO VARIANTS ============ */
  .khero{background:var(--navy);color:#fff;position:relative;overflow:hidden;min-height:720px;display:flex;flex-direction:column}
  .khero-body{flex:1;display:grid;grid-template-columns:1.25fr 1fr;gap:48px;padding:84px 0 56px;align-items:center;position:relative;z-index:2}
  .khero-body > .container{display:contents}
  .khero-lhs{padding-left:28px;padding-right:28px}
  .khero-rhs{padding-right:28px}
  .khero .offer-card{background:#fff;color:var(--dark);border-radius:10px;padding:26px;box-shadow:var(--shadow-xl);position:relative}

  /* --- Variant 1: TICKER + COUNTER --- */
  .v-ticker .khero-eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:var(--fb);font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin-bottom:26px}
  .v-ticker .khero-eyebrow::before{content:'';width:28px;height:2px;background:var(--amber)}
  .v-ticker .live-dot{width:7px;height:7px;border-radius:50%;background:#5EE89E;box-shadow:0 0 0 3px rgba(94,232,158,.25);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(94,232,158,.25)}50%{box-shadow:0 0 0 7px rgba(94,232,158,.05)}}

  .counter-block{display:flex;align-items:flex-start;gap:24px;margin-bottom:28px}
  .counter-huge{font-family:var(--fh);font-weight:800;font-size:168px;line-height:.8;letter-spacing:-.04em;color:#fff;display:inline-flex;align-items:baseline}
  .counter-huge .unit{font-size:56px;color:var(--amber);margin-left:6px;letter-spacing:-.02em}
  .counter-caption{padding-top:14px;max-width:240px}
  .counter-caption .t{font-family:var(--fh);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;margin-bottom:4px}
  .counter-caption .s{font-size:12px;color:rgba(255,255,255,.5);line-height:1.55}

  .kh-headline{font-family:var(--fh);font-weight:800;font-size:72px;line-height:.92;letter-spacing:-.01em;color:#fff;text-transform:uppercase;margin:0 0 18px;text-wrap:balance}
  .kh-headline .line2{color:var(--amber)}
  .kh-sub{font-family:var(--fb);font-size:16px;color:rgba(255,255,255,.68);line-height:1.65;max-width:480px;margin:0 0 28px}

  .ticker-item{display:inline-flex;align-items:center;gap:14px;font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.78);flex-shrink:0}
  .ticker-item .tloc{color:#fff}
  .ticker-item .tdays{color:var(--amber)}

  .ambient-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:1;mask-image:radial-gradient(ellipse at 30% 40%,black,transparent 75%)}

  @keyframes mdown{0%{transform:translateY(-50%)}100%{transform:translateY(0)}}

  .v-marquee .mark-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(242,166,90,.14);border:1px solid rgba(242,166,90,.35);border-radius:999px;font-family:var(--fb);font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:24px}
  .v-marquee .mark-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 1.6s infinite}

  .v-marquee .kh-headline .flash{display:inline-block;position:relative;color:var(--amber);padding:0 4px}
  .v-marquee .kh-headline .flash::before{content:'';position:absolute;inset:6% -4px;background:rgba(242,166,90,.14);border-radius:3px;z-index:-1;transform:skewX(-8deg)}

  .parallax-house{position:absolute;right:-40px;top:20%;opacity:.08;z-index:1;transform:translateY(var(--py,0px));transition:transform 200ms linear}

  /* --- Variant 3: STAMP / POSTAL --- */
  .v-stamp{min-height:720px;background:#F4EEE3;color:var(--dark)}

  .paper-texture{position:absolute;inset:0;background:

// Animated counter hook
const useCountUp = (target, duration = 1800) => {
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    let raf; const start = performance.now();
    const tick = (t) => {
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setN(Math.round(target * eased));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return n;
};

// Variant switcher + Tweaks panel wiring
const Hero = () => {
  const [variant, setVariant] = React.useState(HERO_VARIANTS.variant || 'ticker');
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    // Announce availability AFTER listener registered
    try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const pick = (v) => {
    setVariant(v);
    try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{variant:v}}, '*'); } catch(e){}
  };

  const Variants = { ticker: HeroTicker, marquee: HeroMarquee, stamp: HeroStamp };
  const Current = Variants[variant] || HeroTicker;

  return (
    <>
      <Current key={variant} />
      <div className={'tweaks ' + (tweaksOpen ? 'open' : '')}>
        <h6>Hero variant</h6>
        <div className="opts">
          <button className={'opt ' + (variant==='ticker'?'active':'')} onClick={()=>pick('ticker')}>
            <span className="k">01</span><span>Ticker + counter</span>
          </button>
          <button className={'opt ' + (variant==='marquee'?'active':'')} onClick={()=>pick('marquee')}>

    </>

};

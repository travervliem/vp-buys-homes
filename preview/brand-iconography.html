<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:#fff;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;font-family:var(--fb)}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px;border:1px solid var(--border);border-radius:8px}
.n{font-family:var(--fh);font-size:10.5px;font-weight:700;color:var(--navy);letter-spacing:.06em;text-transform:uppercase;text-align:center}
.c{font-size:10px;color:var(--gray-500);text-align:center}
.ptxt{font-size:22px;font-weight:700;color:var(--amber);font-family:var(--fb);line-height:1}
.check{font-size:24px;color:var(--navy);line-height:1}
.mid{font-size:22px;color:var(--navy);letter-spacing:.2em;line-height:1}
</style></head><body>
<div class="cell">
  <svg width="34" height="34" viewBox="0 0 32 32"><polygon points="16,2 30,12 30,30 2,30 2,12" fill="#1B365D"/><rect x="11" y="18" width="10" height="12" rx="1" fill="white"/></svg>
  <div class="n">House mark</div><div class="c">Never alone — pair with "VP"</div>
</div>
<div class="cell"><div class="ptxt">P&nbsp;W</div><div class="n">Contact markers</div><div class="c">Amber letter prefix</div></div>
<div class="cell"><div class="check">✓</div><div class="n">Check mark</div><div class="c">Bullet lists only</div></div>
<div class="cell"><div class="mid">· · ·</div><div class="n">Middle dot</div><div class="c">List separator</div></div>
</body></html>

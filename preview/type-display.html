<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">

.spec{font-family:var(--fb);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-500);font-weight:600;min-width:120px;white-space:nowrap}

<div class="row"><span class="spec">Hero · 72/700</span><span class="sample" style="font-size:54px">WE BUY HOUSES</span></div>
<div class="row"><span class="spec">H1 · 56/700</span><span class="sample" style="font-size:40px">CASH OFFER IN 24 HRS</span></div>
<div class="row"><span class="spec">H2 · 38/700</span><span class="sample" style="font-size:30px">HOW IT WORKS</span></div>
<div class="row"><span class="spec">H3 · 28/600</span><span class="sample" style="font-size:22px;font-weight:600">Close in 7 Days</span></div>

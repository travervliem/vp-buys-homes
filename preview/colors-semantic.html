<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px 28px;background:#fff;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;font-family:var(--fb)}
.chip{border-radius:8px;padding:14px;border:1px solid}
.chip .t{font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.chip .h{font-family:var(--fm);font-size:10.5px}
.ok{background:#DCFCE7;border-color:#86EFAC;color:#15803D}
.wn{background:#FEF3E2;border-color:#FCD9B6;color:#B45309}
.dn{background:#FEE4E2;border-color:#FECACA;color:#B42318}
</style></head><body>
<div class="chip ok"><div class="t">Success</div><div class="h">#15803D · #DCFCE7</div></div>
<div class="chip wn"><div class="t">Warning</div><div class="h">#B45309 · #FEF3E2</div></div>
<div class="chip dn"><div class="t">Danger</div><div class="h">#B42318 · #FEE4E2</div></div>
</body></html>

<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Lead Form</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:var(--light);font-family:var(--fb)}
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:22px;box-shadow:var(--shadow-md);max-width:420px}
.eb{font-family:var(--fb);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
.h{font-family:var(--fh);font-size:22px;font-weight:700;color:var(--navy);letter-spacing:.02em;text-transform:uppercase;line-height:1.1;margin-bottom:14px}
.g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.in{width:100%;padding:11px 13px;font-family:var(--fb);font-size:13px;border:1px solid var(--border);border-radius:6px;background:#fff}
.in.full{grid-column:1/-1}
.btn{width:100%;padding:13px;background:var(--amber);color:#fff;font-family:var(--fh);font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:4px;font-size:13px;box-shadow:var(--shadow-amber);margin-top:8px;cursor:pointer}
.foot{font-size:11px;color:var(--gray-500);margin-top:10px;text-align:center}
</style></head><body>
<div class="card">
  <div class="eb">Cash Offer · 24 Hours</div>
  <div class="h">Tell us about your house</div>
  <div class="g">
    <input class="in" placeholder="Full name">
    <input class="in" placeholder="Phone">
    <input class="in full" placeholder="Property address">
  </div>
  <button class="btn">Get My Cash Offer</button>
  <div class="foot">No obligation · Takes under 2 minutes</div>
</div>
</body></html>

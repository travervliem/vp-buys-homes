<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:var(--light);display:grid;grid-template-columns:1fr 1fr;gap:14px;font-family:var(--fb)}
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:20px;box-shadow:var(--shadow-sm)}
.card.feat{border-top:2px solid var(--amber)}
.num{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--amber);letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}
.t{font-family:var(--fh);font-size:18px;font-weight:700;color:var(--navy);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.b{font-size:13px;color:var(--gray-500);line-height:1.7;margin:0}
</style></head><body>
<div class="card feat"><div class="num">Step 01</div><div class="t">Tell us about the house</div><p class="b">Share the address, condition, and your timeline. Takes under two minutes.</p></div>
<div class="card"><div class="num">Step 02</div><div class="t">Get a written offer</div><p class="b">We review nearby sales and send a no-obligation cash offer within 24 hours.</p></div>
</body></html>

<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px 28px;background:#fff;display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.sw{border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.sc{height:70px}
.si{padding:10px 12px;background:#fff}
.sname{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--navy);line-height:1.1;margin-bottom:3px}
.shex{font-family:var(--fm);font-size:10px;color:var(--gray-500)}
.role{font-size:9px;color:var(--gray-500);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
</style></head><body>
<div class="sw"><div class="sc" style="background:#1B365D"></div><div class="si"><div class="sname">True Navy</div><div class="shex">#1B365D</div><div class="role">Primary</div></div></div>
<div class="sw"><div class="sc" style="background:#F2A65A"></div><div class="si"><div class="sname">Warm Amber</div><div class="shex">#F2A65A</div><div class="role">CTA · Accent</div></div></div>
<div class="sw"><div class="sc" style="background:#FFFFFF;border-bottom:1px solid var(--border)"></div><div class="si"><div class="sname">White</div><div class="shex">#FFFFFF</div><div class="role">Background</div></div></div>
<div class="sw"><div class="sc" style="background:#EEF2F7"></div><div class="si"><div class="sname">Light Tint</div><div class="shex">#EEF2F7</div><div class="role">Alt bg</div></div></div>
<div class="sw"><div class="sc" style="background:#0D1B2A"></div><div class="si"><div class="sname">Near Black</div><div class="shex">#0D1B2A</div><div class="role">Body text</div></div></div>
</body></html>

<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px 28px;background:#fff;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.sc{height:54px}
.si{padding:8px 10px;background:#fff}
.sname{font-family:var(--fh);font-size:10.5px;font-weight:700;color:var(--navy);letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.shex{font-family:var(--fm);font-size:9.5px;color:var(--gray-500)}
</style></head><body>
<div class="sw"><div class="sc" style="background:#F3F4F6"></div><div class="si"><div class="sname">Gray 100</div><div class="shex">#F3F4F6</div></div></div>
<div class="sw"><div class="sc" style="background:#CBD5E1"></div><div class="si"><div class="sname">Gray 300</div><div class="shex">#CBD5E1</div></div></div>
<div class="sw"><div class="sc" style="background:#9CA3AF"></div><div class="si"><div class="sname">Gray 400</div><div class="shex">#9CA3AF</div></div></div>
<div class="sw"><div class="sc" style="background:#6B7280"></div><div class="si"><div class="sname">Gray 500</div><div class="shex">#6B7280</div></div></div>
<div class="sw"><div class="sc" style="background:#374151"></div><div class="si"><div class="sname">Gray 700</div><div class="shex">#374151</div></div></div>
</body></html>

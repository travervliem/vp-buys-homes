<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Spacing — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:#fff;display:flex;gap:18px;align-items:flex-end;font-family:var(--fb)}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:64px;height:64px;background:var(--navy)}
.n{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.04em;text-transform:uppercase}
.v{font-family:var(--fm);font-size:10px;color:var(--gray-500)}
</style></head><body>
<div class="cell"><div class="box" style="border-radius:3px"></div><div class="n">XS</div><div class="v">3px</div></div>
<div class="cell"><div class="box" style="border-radius:4px"></div><div class="n">SM</div><div class="v">4px</div></div>
<div class="cell"><div class="box" style="border-radius:6px"></div><div class="n">MD</div><div class="v">6px</div></div>
<div class="cell"><div class="box" style="border-radius:8px"></div><div class="n">LG</div><div class="v">8px</div></div>
<div class="cell"><div class="box" style="border-radius:10px"></div><div class="n">XL</div><div class="v">10px</div></div>
<div class="cell"><div class="box" style="border-radius:14px"></div><div class="n">2XL</div><div class="v">14px</div></div>
<div class="cell"><div class="box" style="border-radius:999px"></div><div class="n">Pill</div><div class="v">full</div></div>
</body></html>

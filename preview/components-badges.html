<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:#fff;display:flex;flex-wrap:wrap;gap:10px;align-items:center;font-family:var(--fb)}
.bdg{display:inline-flex;align-items:center;padding:5px 14px;border-radius:999px;font-family:var(--fh);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;line-height:1}
.b-amber{background:var(--amber);color:#fff}
.b-navy{background:var(--navy);color:#fff}
.b-outline{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
.b-soft{background:rgba(242,166,90,.12);color:var(--amber-dark);border:1px solid rgba(242,166,90,.35)}
.b-dot{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;background:var(--light);color:var(--navy);font-family:var(--fb);font-size:11px;font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;background:#15803D}
</style></head><body>
<span class="bdg b-amber">Cash Offer · 24 Hrs</span>
<span class="bdg b-navy">Local · Discreet · As-is</span>
<span class="bdg b-outline">No Obligation</span>
<span class="bdg b-soft">All Cash</span>
<span class="b-dot"><span class="dot"></span>Serving 5 GA Cities</span>
</body></html>

<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Spacing — Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:28px;background:#fff;display:grid;grid-template-columns:repeat(5,1fr);gap:18px;font-family:var(--fb)}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:70px;height:52px;background:#fff;border-radius:8px;border:1px solid #EEF2F7}
.n{font-family:var(--fh);font-size:10.5px;font-weight:700;color:var(--navy);letter-spacing:.06em;text-transform:uppercase}
</style></head><body>
<div class="cell"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">XS</div></div>
<div class="cell"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">SM</div></div>
<div class="cell"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">MD</div></div>
<div class="cell"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">LG</div></div>
<div class="cell"><div class="box" style="box-shadow:var(--shadow-amber);background:#F2A65A;border:none"></div><div class="n">Amber CTA</div></div>
</body></html>

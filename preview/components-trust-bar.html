<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Trust Bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:18px 28px;background:var(--light);font-family:var(--fb)}
.bar{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:20px 26px;background:#fff;border-radius:8px;border:1px solid var(--border)}
.c{text-align:left;border-left:2px solid var(--amber);padding-left:14px}
.n{font-family:var(--fh);font-size:26px;font-weight:700;color:var(--navy);letter-spacing:.02em;line-height:1;margin-bottom:4px}
.l{font-family:var(--fb);font-size:10px;font-weight:700;color:var(--gray-500);letter-spacing:.14em;text-transform:uppercase}
</style></head><body>
<div class="bar">
  <div class="c"><div class="n">24 HRS</div><div class="l">Cash offer</div></div>
  <div class="c"><div class="n">7–21</div><div class="l">Days to close</div></div>
  <div class="c"><div class="n">0%</div><div class="l">Commissions</div></div>
  <div class="c"><div class="n">AS-IS</div><div class="l">Any condition</div></div>
</div>
</body></html>

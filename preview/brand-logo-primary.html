<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Logo — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:#fff;display:flex;align-items:center;justify-content:center}
.lb{display:flex;align-items:center;gap:10px}
.vp{font-family:var(--fh);font-size:54px;font-weight:700;color:var(--navy);letter-spacing:.02em;line-height:1}

.eq{font-family:var(--fh);font-size:17px;font-weight:700;letter-spacing:.1em;color:var(--navy);text-transform:uppercase;line-height:1}
.url{font-family:var(--fb);font-size:9.5px;letter-spacing:.18em;color:var(--gray-400);text-transform:uppercase}

<div class="lb">
  <span class="vp">VP</span>
  <svg width="44" height="44" viewBox="0 0 32 32"><polygon points="16,2 30,12 30,30 2,30 2,12" fill="#1B365D"/><rect x="11" y="18" width="10" height="12" rx="1" fill="white"/></svg>
  <div class="div"></div>
  <div class="tx"><div class="eq">VP EQUITIES</div><div class="url">VPBUYSHOMES.COM</div></div>
</div>

<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Colors — Ratio</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:#fff;font-family:var(--fb)}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-500);font-weight:700;margin-bottom:8px}
.bar{display:flex;border-radius:4px;overflow:hidden;height:36px;margin-bottom:8px}
.note{font-size:12px;color:var(--gray-500);margin-bottom:18px}
</style></head><body>
<div class="lbl">Preferred brand ratio</div>
<div class="bar"><div style="flex:4;background:#1B365D"></div><div style="flex:1;background:#F2A65A"></div></div>
<div class="note">80% True Navy · 20% Warm Amber (CTAs only — never dilute)</div>
<div class="lbl">Digital page mix</div>
<div class="bar"><div style="flex:2;background:#EEF2F7"></div><div style="flex:2;background:#1B365D"></div><div style="flex:1;background:#fff;border:1px solid #D1DCE8"></div></div>
</body></html>

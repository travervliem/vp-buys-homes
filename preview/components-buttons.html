<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:#fff;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.btn{font-family:var(--fh);font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;cursor:pointer;border-radius:4px;padding:12px 22px;font-size:13px;transition:all 120ms var(--ease-standard)}
.btn-amber{background:var(--amber);color:#fff;box-shadow:var(--shadow-amber)}
.btn-amber:hover{background:var(--amber-dark)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-deep)}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
.btn-ghost:hover{background:var(--navy);color:#fff}
.btn-link{background:none;color:var(--navy);padding:8px 0;font-family:var(--fb);letter-spacing:.04em;font-size:13px;border-bottom:2px solid var(--amber);border-radius:0}
.btn-amber-pill{border-radius:999px;padding:10px 20px;font-size:11px;background:var(--amber);color:#fff}
</style></head><body>
<button class="btn btn-amber">Get My Cash Offer</button>
<button class="btn btn-navy">How it Works</button>
<button class="btn btn-ghost">Learn More</button>
<button class="btn btn-amber-pill">Cash Offer · 24 Hrs</button>
<button class="btn btn-link">See all areas →</button>
</body></html>

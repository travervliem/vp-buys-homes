<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:#fff;font-family:var(--fb)}
.row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.bar{background:var(--navy);height:14px;border-radius:2px}
.n{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.04em;width:50px;text-transform:uppercase}
.v{font-family:var(--fm);font-size:10px;color:var(--gray-500);width:48px}
</style></head><body>
<div class="row"><span class="n">S-1</span><span class="v">4</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="n">S-2</span><span class="v">8</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="n">S-4</span><span class="v">16</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="n">S-6</span><span class="v">24</span><span class="bar" style="width:24px"></span></div>
<div class="row"><span class="n">S-8</span><span class="v">32</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="n">S-12</span><span class="v">48</span><span class="bar" style="width:48px"></span></div>
<div class="row"><span class="n">S-18</span><span class="v">72</span><span class="bar" style="width:72px"></span></div>
<div class="row"><span class="n">S-24</span><span class="v">96</span><span class="bar" style="width:96px"></span></div>
</body></html>

<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Type — Families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px 28px;background:#fff;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pane{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.pmeta{background:var(--light);padding:8px 14px;display:flex;justify-content:space-between;font-family:var(--fh);font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.04em;text-transform:uppercase}
.pmrole{font-family:var(--fb);font-size:9px;letter-spacing:.1em;color:var(--gray-500);font-weight:600}
.prev{padding:14px 16px}
.big{font-size:42px;font-weight:700;color:var(--navy);line-height:1;margin-bottom:6px}
.alpha{font-size:11px;font-weight:600;color:var(--navy);letter-spacing:.05em;margin-bottom:4px}
.sample{font-size:11px;color:var(--gray-500);line-height:1.55}
</style></head><body>
<div class="pane">
  <div class="pmeta"><span>Barlow Semi Condensed</span><span class="pmrole">Display</span></div>
  <div class="prev">
    <div class="big" style="font-family:var(--fh);letter-spacing:.02em">Aa Bb Cc</div>
    <div class="alpha" style="font-family:var(--fh)">ABCDEFGHIJKLMNOPQR</div>
    <div class="sample" style="font-family:var(--fh)">400 · 500 · 600 · 700 · 800</div>
  </div>
</div>
<div class="pane">
  <div class="pmeta"><span>Nunito Sans</span><span class="pmrole">Body · UI</span></div>
  <div class="prev">
    <div class="big" style="font-family:var(--fb);font-weight:400">Aa Bb Cc</div>
    <div class="alpha" style="font-family:var(--fb)">ABCDEFGHIJKLMNOPQR</div>
    <div class="sample" style="font-family:var(--fb)">300 · 400 · 600 · 700</div>
  </div>
</div>
</body></html>

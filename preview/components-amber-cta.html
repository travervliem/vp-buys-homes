<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Amber CTA Block</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 28px;background:var(--navy);font-family:var(--fb)}
.cta{display:flex;align-items:center;gap:16px;padding:16px 22px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px}
.amber-box{background:var(--amber);padding:14px 20px;border-radius:6px;text-align:center}
.amber-box .l{font-family:var(--fh);font-size:9px;font-weight:700;color:#fff;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;opacity:.95}
.amber-box .p{font-family:var(--fh);font-size:18px;font-weight:700;color:#fff;letter-spacing:.02em;line-height:1}
.t{flex:1}
.t .h{font-family:var(--fh);font-size:18px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.02em;line-height:1.15;margin-bottom:4px}
.t .s{font-size:12px;color:rgba(255,255,255,.55)}
</style></head><body>
<div class="cta">
  <div class="t"><div class="h">Get Your Cash Offer</div><div class="s">No fees · No repairs · No obligation</div></div>
  <div class="amber-box"><div class="l">Call or Text</div><div class="p">(912) 555-0120</div></div>
</div>
</body></html>

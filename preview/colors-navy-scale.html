<!DOCTYPE html><html><head>
<meta charset="utf-8"><title>Colors — Navy scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px 28px;background:#fff;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sw{border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.sc{height:60px}
.si{padding:9px 11px;background:#fff}
.sname{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.shex{font-family:var(--fm);font-size:9.5px;color:var(--gray-500)}
</style></head><body>
<div class="sw"><div class="sc" style="background:#0F2040"></div><div class="si"><div class="sname">Navy Deep</div><div class="shex">#0F2040</div></div></div>
<div class="sw"><div class="sc" style="background:#1B365D"></div><div class="si"><div class="sname">Navy</div><div class="shex">#1B365D</div></div></div>
<div class="sw"><div class="sc" style="background:#264D80"></div><div class="si"><div class="sname">Navy Mid</div><div class="shex">#264D80</div></div></div>
<div class="sw"><div class="sc" style="background:#0D1B2A"></div><div class="si"><div class="sname">Near Black</div><div class="shex">#0D1B2A</div></div></div>
</body></html>
